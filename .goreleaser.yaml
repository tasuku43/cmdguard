version: 2

project_name: cc-bash-guard

before:
  hooks:
    - go test ./...

builds:
  - id: cc-bash-guard
    main: ./cmd/cc-bash-guard
    binary: cc-bash-guard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tasuku43/cc-bash-guard/internal/infra/buildinfo.version={{ .Version }}
      - -X github.com/tasuku43/cc-bash-guard/internal/infra/buildinfo.commit={{ .Commit }}
      - -X github.com/tasuku43/cc-bash-guard/internal/infra/buildinfo.date={{ .Date }}

archives:
  - id: archives
    ids:
      - cc-bash-guard
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Tag }}_
      {{- if eq .Os "darwin" -}}macos{{- else -}}{{ .Os }}{{- end -}}_
      {{- if eq .Arch "amd64" -}}x64{{- else -}}{{ .Arch }}{{- end -}}

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  prerelease: auto
