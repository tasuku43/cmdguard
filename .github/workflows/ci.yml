name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "These files are not gofmt'd:"
            echo "${unformatted}"
            exit 1
          fi

      - name: go mod tidy
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          cp go.mod go.sum "${tmpdir}/"
          go mod tidy
          diff -u "${tmpdir}/go.mod" go.mod
          diff -u "${tmpdir}/go.sum" go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

      - name: binary smoke test
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          go build -o "${tmpdir}/cc-bash-guard" ./cmd/cc-bash-guard
          "${tmpdir}/cc-bash-guard" version
          "${tmpdir}/cc-bash-guard" help
          "${tmpdir}/cc-bash-guard" help semantic

      - name: goreleaser check
        run: go run github.com/goreleaser/goreleaser/v2@v2.12.7 check

  race:
    name: Go test (race)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: go test -race
        run: go test -race ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
