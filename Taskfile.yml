version: "3"

vars:
  BIN: cmdproxy

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the cmdproxy binary into the repository root
    cmds:
      - go build -o {{.BIN}} ./cmd/cmdproxy

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  clean:
    desc: Remove the built binary from the repository root
    cmds:
      - rm -f {{.BIN}}
