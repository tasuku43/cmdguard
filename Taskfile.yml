version: "3"

vars:
  BIN: cc-bash-proxy

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the cc-bash-proxy binary into the repository root
    cmds:
      - go build -o {{.BIN}} ./cmd/cc-bash-proxy

  test:
    desc: Run the Go test suite
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  vulncheck:
    desc: Run govulncheck
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  mod:tidy-check:
    desc: Verify go.mod and go.sum are tidy
    cmds:
      - |
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "${tmpdir}"' EXIT
        cp go.mod go.sum "${tmpdir}/"
        go mod tidy
        diff -u "${tmpdir}/go.mod" go.mod
        diff -u "${tmpdir}/go.sum" go.sum

  release:preflight:
    desc: Run pre-release verification checks
    cmds:
      - |
        unformatted="$(gofmt -l .)"
        if [ -n "${unformatted}" ]; then
          echo "These files are not gofmt'd:"
          echo "${unformatted}"
          exit 1
        fi
      - task: mod:tidy-check
      - task: vet
      - task: test
      - task: vulncheck
      - go run github.com/goreleaser/goreleaser/v2@v2.12.7 check

  clean:
    desc: Remove the built binary from the repository root
    cmds:
      - rm -f {{.BIN}}
